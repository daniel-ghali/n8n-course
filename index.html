<style>
:root {
  --color-primary: #ff6d5a; 
  --color-primary-glow: rgba(255, 109, 90, 0.3);
  --color-secondary: #ff8c7a;
  --color-accent: #00e5ff; 
  --color-bg-deep: #0c0c14;
  --color-bg-card: #161621;
  --color-bg-hover: #1e1e2d;
  --color-text-main: #f0f0f5;
  --color-text-muted: #a0a0b0;
  --color-border: rgba(255, 255, 255, 0.08);
  --color-border-bright: rgba(255, 109, 90, 0.2);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background-color: var(--color-bg-deep);
  color: var(--color-text-main);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;

}

.course-wrap { 
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1.5rem; 
}

.course-wrap  h2 { 
  max-width: 900px;
  text-align: center;
  font-size: 20px;
  margin: 0 auto;
  padding: 2rem 1.5rem; 
}

.course-header { 
  margin-bottom: 3rem; 
  text-align: center;
}

.course-header h1 { 
  font-size: 2.5rem; 
  font-weight: 800; 
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff 0%, #ff6d5a 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.5rem; 
}

.course-header p { 
  font-size: 1.1rem; 
  color: var(--color-text-muted); 
  max-width: 600px;
  margin: 0 auto;
}

.progress-bar-wrap { 
  margin: 2rem auto 0;
  max-width: 500px;
}

.progress-label { 
  font-size: 0.85rem; 
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--color-primary); 
  margin-bottom: 0.75rem; 
  display: block;
}

.progress-track { 
  height: 8px; 
  background: rgba(255, 255, 255, 0.05); 
  border-radius: 99px; 
  overflow: hidden; 
  position: relative;
}

.progress-fill { 
  height: 100%; 
  border-radius: 99px; 
  background: linear-gradient(90deg, var(--color-primary), var(--color-secondary)); 
  box-shadow: 0 0 15px var(--color-primary-glow);
  transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
}

.stats-row { 
  display: grid; 
  grid-template-columns: repeat(3, 1fr); 
  gap: 1.5rem; 
  margin-bottom: 3rem; 
}

.stat-card { 
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(10px);
  border-radius: 16px; 
  padding: 1.5rem; 
  text-align: center;
  transition: transform 0.3s ease, border-color 0.3s ease;
}

.stat-card:hover {
  transform: translateY(-5px);
  border-color: var(--color-border-bright);
}

.stat-num { 
  font-size: 2rem; 
  font-weight: 800; 
  color: #fff; 
  display: block;
}

.stat-lbl { 
  font-size: 0.75rem; 
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--color-text-muted); 
  margin-top: 0.25rem; 
}

.module-grid { 
  display: flex; 
  flex-direction: column; 
  gap: 1rem; 
}

.module-card { 
  background: var(--color-bg-card); 
  border: 1px solid var(--color-border); 
  border-radius: 20px; 
  overflow: hidden; 
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

.module-card:hover {
  border-color: var(--color-border-bright);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.module-header { 
  display: flex; 
  align-items: center; 
  gap: 1.25rem; 
  padding: 1.5rem; 
  cursor: pointer; 
  user-select: none; 
}

.module-header:hover { background: var(--color-bg-hover); }

.module-num { 
  width: 44px; 
  height: 44px; 
  border-radius: 12px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 1rem; 
  font-weight: 700; 
  flex-shrink: 0; 
  background: var(--color-primary); 
  color: #fff; 
  box-shadow: 0 4px 12px var(--color-primary-glow);
}

.module-meta { flex: 1; text-align: start; }
.module-title { font-size: 1.15rem; font-weight: 700; color: #fff; }
.module-subtitle { font-size: 0.9rem; color: var(--color-text-muted); margin-top: 2px; }

.module-badge { 
  font-size: 0.7rem; 
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 4px 12px; 
  border-radius: 99px; 
  background: rgba(255, 255, 255, 0.05);
  color: var(--color-text-muted);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.module-chevron { 
  font-size: 0.8rem; 
  color: var(--color-text-muted); 
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
}
.module-chevron.open { transform: rotate(90deg); color: var(--color-primary); }

.module-body { 
  display: none; 
  border-top: 1px solid var(--color-border); 
  background: rgba(0, 0, 0, 0.1);
}
.module-body.open { display: block; }

.lesson-list { padding: 1rem 0; }

.lesson-row { 
  display: flex; 
  align-items: flex-start; 
  gap: 1.25rem; 
  padding: 1rem 1.5rem;
  padding-inline-start: 4.5rem;
  cursor: pointer; 
  transition: background 0.2s ease;
}

.lesson-row:hover { background: var(--color-bg-hover); }

.lesson-check { 
  width: 22px; 
  height: 22px; 
  border-radius: 6px; 
  border: 2px solid var(--color-border); 
  flex-shrink: 0; 
  margin-top: 2px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 0.7rem; 
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
}

.lesson-check.done { 
  background: var(--color-primary); 
  border-color: var(--color-primary); 
  color: #fff; 
  box-shadow: 0 0 10px var(--color-primary-glow);
}

.lesson-info { flex: 1; text-align: start; }
.lesson-title { font-size: 1rem; font-weight: 600; color: #fff; }
.lesson-desc { font-size: 0.85rem; color: var(--color-text-muted); margin-top: 4px; line-height: 1.5; }

.lesson-tag { 
  font-size: 0.65rem; 
  font-weight: 700;
  text-transform: uppercase;
  padding: 2px 8px; 
  border-radius: 4px; 
  margin-top: 0.75rem; 
  display: inline-block; 
}

.tag-concept { background: rgba(0, 229, 255, 0.1); color: var(--color-accent); }
.tag-hands { background: rgba(255, 109, 90, 0.1); color: var(--color-primary); }
.tag-project { background: rgba(255, 255, 255, 0.05); color: #fff; }
.tag-tip { background: rgba(255, 255, 255, 0.05); color: var(--color-text-muted); }

.content-panel { 
  background: var(--color-bg-hover); 
  border-top: 1px solid var(--color-border); 
  padding: 2rem; 
  display: none; 
}

.content-panel.open { display: block; animation: slideDown 0.4s ease; }

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.content-panel h3 { font-size: 1.25rem; font-weight: 700; color: #fff; margin-bottom: 1rem; text-align: start; }
.content-panel p { font-size: 1rem; color: var(--color-text-muted); margin-bottom: 1rem; text-align: start; }
.content-panel ul { padding-inline-start: 1.5rem; margin-bottom: 1.5rem; text-align: start; }
.content-panel ul li { font-size: 0.95rem; color: var(--color-text-muted); margin-bottom: 0.5rem; }

.ask-btn { 
  margin-top: 1.5rem; 
  display: inline-flex; 
  align-items: center; 
  gap: 0.5rem; 
  font-size: 0.9rem; 
  font-weight: 600;
  padding: 0.75rem 1.5rem; 
  border-radius: 12px; 
  border: none; 
  background: #fff; 
  color: var(--color-bg-deep); 
  cursor: pointer; 
  transition: all 0.3s ease;
}

.ask-btn:hover { 
  background: var(--color-primary); 
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px var(--color-primary-glow);
}

@media (max-width: 768px) {
  .course-header h1 { font-size: 1.8rem; }
  .stats-row { grid-template-columns: 1fr; gap: 1rem; }
  .module-header { padding: 1.25rem; }
  .lesson-row { padding-right: 1.5rem; }
  .module-num { width: 36px; height: 36px; font-size: 0.9rem; }
  .content-panel { padding: 1.5rem; }
}
</style>
</head>

<body>


<div class="course-wrap">
<h2 class="sr-only">n8n full course — By Daniel Ghlay </h2>

<div class="course-header">
  <h1>n8n — from zero to automation</h1>
  <p>A structured course to understand, build, and deploy real automations with n8n. Click any lesson to read it, then mark it done.</p>
  <div class="progress-bar-wrap">
    <div class="progress-label" id="prog-label">0 of 40 lessons completed</div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-num">8</div><div class="stat-lbl">Modules</div></div>
  <div class="stat-card"><div class="stat-num">40</div><div class="stat-lbl">Lessons</div></div>
  <div class="stat-card"><div class="stat-num" id="done-count">0</div><div class="stat-lbl">Completed</div></div>
</div>

<div class="module-grid" id="modules"></div>
</div>

<script>
const TOTAL = 40;
const done = new Set();

const modules = [
  {
    num: '01', title: 'What is n8n?', subtitle: 'Core concepts & mental model', color: '#E6F1FB', textColor: '#0C447C', badge: 'Foundation', badgeBg: '#E6F1FB', badgeColor: '#0C447C',
    lessons: [
      { title: 'n8n in one sentence', tag: 'concept', desc: 'What n8n is, what problem it solves, and why it exists.', content: { h: 'n8n in one sentence', p: ['n8n (pronounced "n-eight-n") is an open-source workflow automation tool. It lets you connect apps, APIs, and services together using a visual canvas — no code required for most tasks, but full code access when you need it.', 'Think of it like Zapier or Make (formerly Integromat), but self-hostable, more powerful, and free for self-hosted use.'], points: ['Visual drag-and-drop canvas', 'Connect 400+ apps out of the box', 'Self-host on your own server or use n8n Cloud', 'Runs automations called Workflows'] } },
      { title: 'Workflows, nodes & triggers — the three pillars', tag: 'concept', desc: 'The three building blocks everything else is made of.', content: { h: 'The three pillars', p: ['A Workflow is a chain of steps that run in sequence (or in parallel). Each step is called a Node. The first node is almost always a Trigger — the event that starts everything.', 'Example: "When a new row is added to Google Sheets (Trigger) → send a Slack message (Node) → log it to Airtable (Node)."'], points: ['Trigger: the starting event (webhook, schedule, form, etc.)', 'Node: a single action or transformation step', 'Workflow: the full connected chain of nodes'] } },
      { title: 'n8n vs Zapier vs Make — pick the right tool', tag: 'concept', desc: 'Honest comparison so you know what you\'re choosing.', content: { h: 'n8n vs Zapier vs Make', p: ['Zapier: easiest, most integrations, but expensive at scale and no self-hosting. Make: visual and powerful, good pricing, but no self-hosting. n8n: steepest learning curve but free self-hosted, unlimited executions, and full code access.', 'If you\'re building for a business and want control + no per-task pricing, n8n wins. If you want zero setup, Zapier wins.'], points: ['n8n: self-host, open source, code-friendly', 'Zapier: easiest onboarding, most app coverage', 'Make: best visual logic, mid-tier pricing'] } },
      { title: 'Cloud vs self-hosted — which setup to use', tag: 'concept', desc: 'Two ways to run n8n and when to pick each.', content: { h: 'Cloud vs self-hosted', p: ['n8n Cloud: sign up at n8n.io, no server needed, $20/month starter plan. Great for getting started fast.', 'Self-hosted: install on any server (VPS, Docker, Raspberry Pi). Free forever, full control, but you manage updates and backups.'], points: ['Cloud: fastest to start, managed infrastructure', 'Self-hosted with Docker: recommended for production use', 'Self-hosted on VPS (e.g. Hetzner, DigitalOcean): ~$5/month total cost'] } },
    ]
  },
  {
    num: '02', title: 'Setup & first workflow', subtitle: 'Install n8n and build your first automation', color: '#EAF3DE', textColor: '#3B6D11', badge: 'Hands-on', badgeBg: '#EAF3DE', badgeColor: '#3B6D11',
    lessons: [
      { title: 'Install n8n with Docker (recommended)', tag: 'hands', desc: 'The fastest reliable way to run n8n locally or on a server.', content: { h: 'Install with Docker', p: ['Docker is the easiest way. Make sure Docker Desktop is installed, then run this single command:', 'docker run -it --rm --name n8n -p 5678:5678 -v ~/.n8n:/home/node/.n8n docker.n8n.io/n8nio/n8n', 'Then open http://localhost:5678 in your browser. You\'ll see the n8n editor.'], points: ['Requires Docker Desktop installed first', 'Data is saved in ~/.n8n folder on your machine', 'For production, use docker-compose with a database'] } },
      { title: 'The n8n editor — a guided tour', tag: 'concept', desc: 'Understanding every part of the UI before you build.', content: { h: 'The n8n editor', p: ['The canvas is where you build workflows. On the left is the node panel (search and add nodes). At the top is the toolbar (save, execute, settings). Each node has an input and output connector.', 'When you click a node, a panel opens on the right showing its settings. This is where you configure what the node does.'], points: ['Canvas: drag nodes, draw connections', 'Node panel: search 400+ integrations', 'Execution log: see every run and its data', 'Settings panel: configure each node'] } },
      { title: 'Your first workflow — schedule + HTTP request', tag: 'hands', desc: 'Build a real workflow in 10 minutes from scratch.', content: { h: 'First workflow', p: ['Goal: every hour, fetch the latest Bitcoin price from a public API and log it.', 'Step 1 — Add a Schedule Trigger node. Set it to run every 1 hour. Step 2 — Add an HTTP Request node. Set the URL to https://api.coindesk.com/v1/bpi/currentprice.json. Step 3 — Connect them. Click Execute Workflow. Done.'], points: ['Schedule Trigger → runs on a timer', 'HTTP Request → fetches data from any URL', 'The output appears in the node panel as JSON'] } },
      { title: 'Understanding data flow — what passes between nodes', tag: 'concept', desc: 'The most important mental model in n8n.', content: { h: 'Data flow in n8n', p: ['Every node receives an array of items and outputs an array of items. Each item is a JSON object. The next node processes each item, one by one (or all at once depending on the node).', 'This is the core mental model. Once you understand that data flows as JSON arrays between nodes, everything else clicks.'], points: ['Input: array of JSON objects', 'Output: array of JSON objects (modified or new)', 'You can inspect data at any step by clicking the node', 'Missing data = the connection is broken somewhere above'] } },
    ]
  },
  {
    num: '03', title: 'Core nodes & logic', subtitle: 'The building blocks you\'ll use in every workflow', color: '#EEEDFE', textColor: '#3C3489', badge: 'Core skills', badgeBg: '#EEEDFE', badgeColor: '#3C3489',
    lessons: [
      { title: 'HTTP Request node — call any API', tag: 'hands', desc: 'The most versatile node. GET, POST, PUT, DELETE — all of it.', content: { h: 'HTTP Request node', p: ['The HTTP Request node lets you call any REST API in the world. Set the method (GET/POST/etc.), the URL, add headers or a body, and it returns the response as JSON.', 'Use case: call OpenAI, send data to Airtable, trigger a webhook, fetch weather data — anything with an API.'], points: ['Method: GET, POST, PUT, PATCH, DELETE', 'Authentication: API key, Bearer token, Basic auth', 'Body: JSON, form, raw text', 'Response: automatically parsed as JSON'] } },
      { title: 'IF node — conditional logic', tag: 'hands', desc: 'Branch your workflow based on any condition.', content: { h: 'IF node', p: ['The IF node splits your workflow into two paths: true and false. You set a condition (e.g. "if the price is greater than 50000") and the data flows down the matching path.', 'You can chain multiple IF nodes to create complex branching logic.'], points: ['Condition types: equals, contains, greater than, regex, etc.', 'Two outputs: true branch and false branch', 'Can compare strings, numbers, booleans, dates', 'Use Switch node for more than 2 branches'] } },
      { title: 'Set node — create and modify data', tag: 'hands', desc: 'Shape your data before passing it to the next node.', content: { h: 'Set node', p: ['The Set node lets you create new fields, modify existing ones, or remove fields from your items. It\'s like a "data shaper".', 'Example: you receive {firstName, lastName} and want to create {fullName}. Add a Set node, create a field called fullName, and set the value to {{ $json.firstName + " " + $json.lastName }}.'], points: ['Add new fields to items', 'Modify existing field values', 'Remove fields you don\'t need', 'Use expressions ({{ }}) to compute values'] } },
      { title: 'Expressions — dynamic values with {{ }}', tag: 'concept', desc: 'How to reference data from previous nodes dynamically.', content: { h: 'Expressions', p: ['Anywhere you see a text field in n8n, you can use an expression by wrapping it in double curly braces: {{ }}. Inside, you can reference data from any previous node.', '{{ $json.email }} — gets the email field from the current item. {{ $node["Node Name"].json.field }} — gets data from a specific named node. You can also write JavaScript: {{ $json.price * 1.14 }}.'], points: ['$json — current item\'s data', '$node["Name"].json — data from a specific node', '$workflow — workflow metadata', '$now — current timestamp'] } },
      { title: 'Loop / Split in Batches — handle large datasets', tag: 'concept', desc: 'Process hundreds or thousands of items without crashing.', content: { h: 'Loops and batches', p: ['By default, n8n processes all items in one go. For large datasets (100+ items), use the Split in Batches node to process them in groups of e.g. 10.', 'Connect the "loop" output back to a previous node to create a real loop. Use the "done" output to continue after all batches are finished.'], points: ['Split in Batches: processes N items at a time', 'Loop output: goes back to continue processing', 'Done output: triggers when all batches finished', 'Prevents API rate limit errors and memory issues'] } },
      { title: 'Merge node — combine data from multiple paths', tag: 'hands', desc: 'Join two streams of data back into one.', content: { h: 'Merge node', p: ['When your workflow splits into two branches (e.g. after an IF node), you often need to join them back together. The Merge node does this.', 'Modes: Append (stack items from both), Merge by Index (pair item 1 with item 1), Merge by Key (join on a shared field like email or ID).'], points: ['Append: combine all items from both inputs', 'Merge by Key: SQL-style JOIN on a shared field', 'Use after parallel branches that need to reunite', 'Essential for enrichment workflows'] } },
      { title: 'Code node — run custom JavaScript', tag: 'hands', desc: 'Full JavaScript when no node covers your need.', content: { h: 'Code node', p: ['The Code node lets you write JavaScript directly. You receive items as the variable items and must return an array of items.', 'Use it for: complex data transformations, custom calculations, string parsing, anything that no built-in node handles cleanly.'], points: ['Input: items array (same as every node)', 'Output: return an array of objects', 'Full JS available: loops, regex, Date, Math, JSON', 'Avoid external npm packages unless self-hosted'] } },
    ]
  },
  {
    num: '04', title: 'Triggers & integrations', subtitle: 'Starting workflows from real events', color: '#FAEEDA', textColor: '#854F0B', badge: 'Integrations', badgeBg: '#FAEEDA', badgeColor: '#854F0B',
    lessons: [
      { title: 'Webhook trigger — receive data from anywhere', tag: 'hands', desc: 'The most powerful trigger. Any service can call it.', content: { h: 'Webhook trigger', p: ['A webhook gives you a URL. When something calls that URL (a form, an app, another service), your workflow runs. It\'s real-time and works with anything that can send an HTTP request.', 'Activate your workflow, copy the webhook URL, and paste it into your form tool, payment gateway, or any service that supports webhooks.'], points: ['GET or POST requests supported', 'Data arrives in $json automatically', 'Set up in Typeform, Stripe, GitHub, etc.', 'Use "Respond to Webhook" node to send a response back'] } },
      { title: 'Schedule trigger — time-based automation', tag: 'hands', desc: 'Run workflows every minute, hour, day, or on a cron schedule.', content: { h: 'Schedule trigger', p: ['Use the Schedule Trigger for anything that should run on a timer: daily reports, hourly syncs, weekly digests, midnight cleanups.', 'You can set it to a simple interval (every 15 minutes) or use a cron expression for complex patterns (every Monday at 9am).'], points: ['Simple interval: every N minutes/hours/days', 'Cron: full cron expression support', 'Timezone-aware', 'Can trigger multiple times per workflow'] } },
      { title: 'Email trigger (Gmail / IMAP)', tag: 'hands', desc: 'Run a workflow when a new email arrives.', content: { h: 'Email trigger', p: ['Connect your Gmail or any IMAP email account and trigger a workflow on new emails. Filter by sender, subject, or label.', 'Use case: when a client emails you with "invoice" in the subject, automatically extract the data, save it to a spreadsheet, and reply with a confirmation.'], points: ['Gmail node: works with OAuth', 'IMAP: works with any email provider', 'Filter by subject, sender, label', 'Access email body, subject, attachments'] } },
      { title: 'Popular integrations — Google Sheets, Notion, Slack, Airtable', tag: 'hands', desc: 'The four integrations you\'ll use in almost every project.', content: { h: 'Must-know integrations', p: ['Google Sheets: read rows, append rows, update cells. Notion: create pages, update databases, query content. Slack: send messages, post to channels, create DMs. Airtable: read/write records, search, filter.', 'All four use OAuth — connect once in n8n Credentials and reuse across all workflows.'], points: ['Google Sheets: best for simple tabular data', 'Airtable: best for structured relational data', 'Notion: best for knowledge/content management', 'Slack: best for team notifications and alerts'] } },
      { title: 'Using API keys — Credentials in n8n', tag: 'concept', desc: 'The right way to store and reuse API secrets.', content: { h: 'n8n Credentials', p: ['Never paste API keys directly into node fields. Use n8n Credentials instead. Go to Settings → Credentials → Add Credential, select the service, paste your key once, and it\'s securely stored.', 'All nodes that need authentication have a Credential field. Click it, select your saved credential, and you\'re connected.'], points: ['Credentials are encrypted at rest', 'Reuse the same credential across many workflows', 'Supports: API key, OAuth2, Basic auth, custom headers', 'Share credentials across your team (Cloud)'] } },
    ]
  },
  {
    num: '05', title: 'Real-world projects', subtitle: 'Build complete automations end to end', color: '#FAECE7', textColor: '#993C1D', badge: 'Projects', badgeBg: '#FAECE7', badgeColor: '#993C1D',
    lessons: [
      { title: 'Project 1 — Lead capture form → CRM + Slack alert', tag: 'project', desc: 'A complete lead management workflow from scratch.', content: { h: 'Project 1: Lead capture', p: ['Goal: when someone fills a Typeform, save their data to Airtable (your CRM) and send a Slack message to your sales channel.', 'Nodes: Webhook Trigger (Typeform) → Set node (clean up data) → Airtable node (create record) → Slack node (send message).'], points: ['Typeform sends data to your webhook URL', 'Set node formats the name, email, etc.', 'Airtable node creates a new record', 'Slack node posts "New lead: [Name]" to #sales'] } },

let openModule = null;
let openLesson = null;

function updateProgress() {
  const pct = Math.round((done.size / TOTAL) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = done.size + ' of ' + TOTAL + ' lessons completed';
  document.getElementById('done-count').textContent = done.size;
}

function getTag(tag) {
  if (tag === 'concept') return '<span class="lesson-tag tag-concept">Concept</span>';
  if (tag === 'hands') return '<span class="lesson-tag tag-hands">Hands-on</span>';
  if (tag === 'project') return '<span class="lesson-tag tag-project">Project</span>';
  if (tag === 'tip') return '<span class="lesson-tag tag-tip">Pro tip</span>';
  return '';
}

function render() {
  const container = document.getElementById('modules');
  container.innerHTML = '';

  modules.forEach((mod, mi) => {
    const card = document.createElement('div');
    card.className = 'module-card';

    const completed = mod.lessons.filter((_, li) => done.has(mi + '-' + li)).length;

    card.innerHTML = `
      <div class="module-header" data-mi="${mi}">
        <div class="module-num">${mod.num}</div>
        <div class="module-meta">
          <div class="module-title">${mod.title}</div>
          <div class="module-subtitle">${mod.subtitle} · ${completed}/${mod.lessons.length} done</div>
        </div>
        <span class="module-badge">${mod.badge}</span>
        <span class="module-chevron ${openModule === mi ? 'open' : ''}">&#9654;</span>
      </div>
      <div class="module-body ${openModule === mi ? 'open' : ''}">
        <div class="lesson-list">
          ${mod.lessons.map((ls, li) => {
            const key = mi + '-' + li;
            const isDone = done.has(key);
            const isOpen = openLesson === key;
            return `
              <div class="lesson-row" data-mi="${mi}" data-li="${li}">
                <div class="lesson-check ${isDone ? 'done' : ''}" data-check="${key}">
                  ${isDone ? '&#10003;' : ''}
                </div>
                <div class="lesson-info">
                  <div class="lesson-title">${ls.title}</div>
                  <div class="lesson-desc">${ls.desc}</div>
                  ${getTag(ls.tag)}
                </div>
              </div>
              <div class="content-panel ${isOpen ? 'open' : ''}" id="panel-${key}">
                <h3>${ls.content.h}</h3>
                ${ls.content.p.map(p => `<p>${p}</p>`).join('')}
                <ul>${ls.content.points.map(pt => `<li>${pt}</li>`).join('')}</ul>
                <button class="ask-btn" onclick="sendPrompt('Tell me more about: ${ls.title.replace(/'/g, '')} in n8n')">Ask Daniel about this &#8599;</button>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  document.querySelectorAll('.module-header').forEach(h => {
    h.addEventListener('click', () => {
      const mi = parseInt(h.dataset.mi);
      openModule = openModule === mi ? null : mi;
      openLesson = null;
      render();
    });
  });

  document.querySelectorAll('.lesson-row').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.closest('[data-check]')) {
        const key = e.target.closest('[data-check]').dataset.check;
        if (done.has(key)) done.delete(key); else done.add(key);
        updateProgress();
        render();
        return;
      }
      const mi = row.dataset.mi;
      const li = row.dataset.li;
      const key = mi + '-' + li;
      openLesson = openLesson === key ? null : key;
      render();
    });
  });
}

render();
updateProgress();
  </script>
